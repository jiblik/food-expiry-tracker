<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="215" r="113" fill="none" stroke="#e94560" stroke-width="13" opacity="0.9"/>
  <!-- Clock hand - hour -->
  <line x1="256" y1="215" x2="256" y2="142" stroke="white" stroke-width="13" stroke-linecap="round"/>
  <!-- Clock hand - minute -->
  <line x1="256" y1="215" x2="313" y2="232" stroke="white" stroke-width="13" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="215" r="9" fill="#e94560"/>
  <!-- Warning triangle -->
  <polygon points="256,328 297,375 215,375" fill="#f6ad55"/>
  <!-- Exclamation mark -->
  <text x="256" y="362" font-size="36" font-weight="bold" fill="#1a1a2e" text-anchor="middle" dominant-baseline="middle">!</text>
  <!-- EXP text -->
  <text x="256" y="448" font-size="52" font-weight="bold" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial, sans-serif">EXP</text>
</svg>
